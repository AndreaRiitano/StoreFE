<div class="welcome-banner" *ngIf="!keycloakService.isLoggedIn()">
  <div class="banner-content">
    <h2>Benvenuto !</h2>
    <p>Registrati subito allo Store per usufruire di tutte le funzionalità.</p>
    <button class="cta-banner" (click)="keycloakService.register()">Registrati</button>
  </div>
</div>
<div class="container">
  <h2>Il nostro Catalogo Prodotti</h2>

  <div class="product-grid">
    <div class="product-card" *ngFor="let product of products">

      <img [src]="product.imgUrl" alt="{{product.name}}" class="product-thumb">

      <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <span>Prezzo: {{ product.price | currency:'EUR' }}</span>
      </div>



      <div class="product-actions">

        <ng-container *ngIf="isLogged; else anonimoTemplate">
          <button class="btn-detail" [routerLink]="['/prodotti', product.id]">
            Vedi Dettagli
          </button>
          <button class="btn-cart" (click)="aggiungiAlCarrello(product)">
            Aggiungi al Carrello
          </button>
        </ng-container>

        <ng-template #anonimoTemplate>
          <div class="login-prompt">
            <p class="badge-notice">Accedi per acquistare</p>
            <button class="btn-disabled" (click)="keycloakService.login()">
              Accedi per i dettagli
            </button>
          </div>
        </ng-template>

      </div>

    </div>
  </div>
</div>
<section class="featured-section">
</section>
